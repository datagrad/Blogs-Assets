<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.05"/>
    </filter>
  </defs>
  
  <rect width="800" height="450" fill="#f8fafc" rx="16"/>
  
  <text x="400" y="45" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#0f172a" text-anchor="middle">GENERATIVE AI IMPACT AREAS</text>
  <text x="400" y="70" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">How Generative AI is reshaping the modern enterprise landscape</text>
  
  <g transform="translate(50, 100)" filter="url(#shadow)">
    <rect width="220" height="130" rx="12" fill="url(#card-grad)"/>
    <rect width="220" height="6" rx="3" fill="#3b82f6"/>
    <text x="110" y="50" font-family="system-ui, sans-serif" font-size="36" text-anchor="middle">✍️</text>
    <text x="110" y="90" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0f172a" text-anchor="middle">Create Content</text>
    <text x="110" y="110" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Blogs, reports, copywriting</text>
  </g>
  
  <g transform="translate(290, 100)" filter="url(#shadow)">
