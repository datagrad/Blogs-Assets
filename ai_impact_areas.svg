    <text x="110" y="50" font-family="system-ui, sans-serif" font-size="36" text-anchor="middle">🤝</text>
    <text x="110" y="90" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0f172a" text-anchor="middle">Serve Customers</text>
    <text x="110" y="110" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Intelligent chat &amp; support</text>
  </g>
  
  <g transform="translate(530, 100)" filter="url(#shadow)">
    <rect width="220" height="130" rx="12" fill="url(#card-grad)"/>
    <rect width="220" height="6" rx="3" fill="#8b5cf6"/>
    <text x="110" y="50" font-family="system-ui, sans-serif" font-size="36" text-anchor="middle">🔍</text>
    <text x="110" y="90" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0f172a" text-anchor="middle">Analyze Info</text>
    <text x="110" y="110" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Summarize docs &amp; research</text>
  </g>
  
  <g transform="translate(50, 260)" filter="url(#shadow)">
    <rect width="220" height="130" rx="12" fill="url(#card-grad)"/>
    <rect width="220" height="6" rx="3" fill="#f59e0b"/>
    <text x="110" y="50" font-family="system-ui, sans-serif" font-size="36" text-anchor="middle">🚀</text>
    <text x="110" y="90" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0f172a" text-anchor="middle">Build Products</text>
    <text x="110" y="110" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Code assist &amp; prototyping</text>
  </g>
  
  <g transform="translate(290, 260)" filter="url(#shadow)">
    <rect width="220" height="130" rx="12" fill="url(#card-grad)"/>
    <rect width="220" height="6" rx="3" fill="#ec4899"/>
    <text x="110" y="50" font-family="system-ui, sans-serif" font-size="36" text-anchor="middle">📊</text>
    <text x="110" y="90" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0f172a" text-anchor="middle">Generate Insights</text>
    <text x="110" y="110" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Synthesize data &amp; analytics</text>
  </g>
  
  <g transform="translate(530, 260)" filter="url(#shadow)">
    <rect width="220" height="130" rx="12" fill="url(#card-grad)"/>
    <rect width="220" height="6" rx="3" fill="#06b6d4"/>
    <text x="110" y="50" font-family="system-ui, sans-serif" font-size="36" text-anchor="middle">🎯</text>
    <text x="110" y="90" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0f172a" text-anchor="middle">Make Decisions</text>
    <text x="110" y="110" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Scenario planning &amp; options</text>
