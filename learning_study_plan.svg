<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.05"/>
    </filter>
  </defs>
  <rect width="800" height="240" fill="#f8fafc" rx="16"/>
  <text x="400" y="35" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#0f172a" text-anchor="middle">4-WEEK EXAM PREPARATION STUDY PLAN</text>
  
  <g transform="translate(40, 70)" filter="url(#shadow)">
    <rect width="160" height="130" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect width="160" height="30" rx="8" fill="#3b82f6"/>
    <text x="80" y="20" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#ffffff" text-anchor="middle">WEEK 1</text>
    <text x="80" y="55" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">AI Core Concepts</text>
    <text x="80" y="80" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Learn basic concepts</text>
    <text x="80" y="95" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">ML vs. LLM. Data types</text>
    <text x="80" y="110" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">structured/unstructured</text>
  </g>
  
  <g transform="translate(220, 70)" filter="url(#shadow)">
    <rect width="160" height="130" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect width="160" height="30" rx="8" fill="#10b981"/>
    <text x="80" y="20" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#ffffff" text-anchor="middle">WEEK 2</text>
    <text x="80" y="55" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">Google AI Portfolio</text>
    <text x="80" y="80" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Deep dive into Gemini,</text>
    <text x="80" y="95" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Vertex AI Agent Builder</text>
    <text x="80" y="110" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">and hardware. </text>
  </g>
  
  <g transform="translate(400, 70)" filter="url(#shadow)">
    <rect width="160" height="130" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect width="160" height="30" rx="8" fill="#f59e0b"/>
    <text x="80" y="20" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#ffffff" text-anchor="middle">WEEK 3</text>
    <text x="80" y="55" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">Tuning &amp; Prompts</text>
    <text x="80" y="80" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Understand prompts,</text>
    <text x="80" y="95" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">RAG, Grounding &amp;</text>
    <text x="80" y="110" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Human-in-the-loop.</text>
  </g>
  
  <g transform="translate(580, 70)" filter="url(#shadow)">
    <rect width="160" height="130" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect width="160" height="30" rx="8" fill="#8b5cf6"/>
    <text x="80" y="20" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#ffffff" text-anchor="middle">WEEK 4</text>
    <text x="80" y="55" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">Governance &amp; Practice</text>
    <text x="80" y="80" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Ethical AI frameworks</text>
    <text x="80" y="95" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">and practice exams.</text>
    <text x="80" y="110" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Final review.</text>
