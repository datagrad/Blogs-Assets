    <text x="85" y="65" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">Diagnostic</text>
    <text x="85" y="95" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#059669" text-anchor="middle">"Why Did It Happen?"</text>
