<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect width="800" height="280" fill="#f8fafc" rx="16"/>
  <text x="400" y="35" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#0f172a" text-anchor="middle">GENERAL LLM VS. SOURCE-GROUNDED NOTEBOOKLM</text>
  
  <g transform="translate(60, 65)" filter="url(#shadow)">
    <rect width="320" height="180" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="160" y="35" font-family="system-ui, sans-serif" font-size="15" font-weight="800" fill="#e11d48" text-anchor="middle">TRADITIONAL GENERAL AI</text>
    <rect x="20" y="55" width="280" height="1" fill="#e2e8f0"/>
    <text x="160" y="90" font-family="Georgia, serif" font-size="16" font-style="italic" fill="#334155" text-anchor="middle">"What does the internet know?"</text>
    <text x="160" y="130" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Searches public web data. High chance</text>
    <text x="160" y="148" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">of hallucinations. Lacks company context.</text>
  </g>
  
  <g transform="translate(420, 65)" filter="url(#shadow)">
    <rect width="320" height="180" rx="10" fill="#ffffff" stroke="#059669" stroke-width="1.5"/>
    <text x="160" y="35" font-family="system-ui, sans-serif" font-size="15" font-weight="800" fill="#059669" text-anchor="middle">NOTEBOOKLM (GROUNDED)</text>
    <rect x="20" y="55" width="280" height="1" fill="#e2e8f0"/>
    <text x="160" y="90" font-family="Georgia, serif" font-size="16" font-style="italic" fill="#334155" text-anchor="middle">"What do MY documents know?"</text>
    <text x="160" y="130" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Grounded strictly on private sources. Zero-out</text>
    <text x="160" y="148" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">hallucinations outside sources. Built-in citations.</text>
  </g>
</svg>
