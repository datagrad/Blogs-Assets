<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect width="900" height="550" fill="#f8fafc" rx="16"/>
  
  <text x="450" y="45" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#0f172a" text-anchor="middle">GOOGLE CLOUD AI ECOSYSTEM STACK</text>
  <text x="450" y="70" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">A layered reference architecture of Google's AI capabilities</text>
  
  <!-- LAYER 4: APPLICATIONS & AGENTS -->
  <g transform="translate(50, 100)" filter="url(#shadow)">
    <rect width="800" height="90" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect width="140" height="90" rx="12" fill="#ef4444" opacity="0.1"/>
    <text x="70" y="50" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#b91c1c" text-anchor="middle">APPLICATIONS</text>
    <text x="70" y="68" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c" text-anchor="middle">&amp; AGENTS</text>
    
    <!-- App badges -->
    <rect x="170" y="25" width="130" height="40" rx="6" fill="#f1f5f9"/>
    <text x="235" y="50" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#334155" text-anchor="middle">Gemini App 🤖</text>
    
    <rect x="320" y="25" width="130" height="40" rx="6" fill="#f1f5f9"/>
    <text x="385" y="50" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#334155" text-anchor="middle">NotebookLM 📚</text>
    
    <rect x="470" y="25" width="130" height="40" rx="6" fill="#f1f5f9"/>
    <text x="535" y="50" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#334155" text-anchor="middle">Agent Assist 🎧</text>
    
    <rect x="620" y="25" width="150" height="40" rx="6" fill="#f1f5f9"/>
    <text x="695" y="50" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#334155" text-anchor="middle">Workspace AI 📈</text>
  </g>
  
  <!-- LAYER 3: PLATFORM (VERTEX AI) -->
  <g transform="translate(50, 210)" filter="url(#shadow)">
    <rect width="800" height="90" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect width="140" height="90" rx="12" fill="#3b82f6" opacity="0.1"/>
    <text x="70" y="52" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#1d4ed8" text-anchor="middle">VERTEX AI</text>
    <text x="70" y="70" font-family="system-ui, sans-serif" font-size="10" fill="#1d4ed8" text-anchor="middle">ORCHESTRATION</text>
    
    <rect x="170" y="25" width="180" height="40" rx="6" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="260" y="50" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e40af" text-anchor="middle">Model Garden 🪴</text>
    
    <rect x="370" y="25" width="180" height="40" rx="6" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="460" y="50" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e40af" text-anchor="middle">Vertex AI Agent Builder ⚙️</text>
    
    <rect x="570" y="25" width="200" height="40" rx="6" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="670" y="50" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e40af" text-anchor="middle">Tuning &amp; Evaluations 🧪</text>
  </g>
  
  <!-- LAYER 2: FOUNDATION MODELS -->
  <g transform="translate(50, 320)" filter="url(#shadow)">
    <rect width="800" height="90" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect width="140" height="90" rx="12" fill="#10b981" opacity="0.1"/>
    <text x="70" y="52" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#047857" text-anchor="middle">MODELS</text>
    <text x="70" y="70" font-family="system-ui, sans-serif" font-size="10" fill="#047857" text-anchor="middle">INTELLIGENCE</text>
    
    <rect x="170" y="25" width="130" height="40" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="235" y="50" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#065f46" text-anchor="middle">Gemini 🧠</text>
    
    <rect x="320" y="25" width="130" height="40" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="385" y="50" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#065f46" text-anchor="middle">Gemma 🔓</text>
    
    <rect x="470" y="25" width="130" height="40" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="535" y="50" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#065f46" text-anchor="middle">Imagen 🎨</text>
    
    <rect x="620" y="25" width="150" height="40" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="695" y="50" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#065f46" text-anchor="middle">Veo 🎬</text>
  </g>
  
  <!-- LAYER 1: INFRASTRUCTURE -->
  <g transform="translate(50, 430)" filter="url(#shadow)">
    <rect width="800" height="90" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect width="140" height="90" rx="12" fill="#8b5cf6" opacity="0.1"/>
    <text x="70" y="52" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#6d28d9" text-anchor="middle">INFRASTRUCTURE</text>
    <text x="70" y="70" font-family="system-ui, sans-serif" font-size="10" fill="#6d28d9" text-anchor="middle">COMPUTE &amp; SCALE</text>
    
    <rect x="170" y="25" width="180" height="40" rx="6" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="260" y="50" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#5b21b6" text-anchor="middle">TPUs (Google Custom AI) ⚡</text>
    
    <rect x="370" y="25" width="180" height="40" rx="6" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="460" y="50" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#5b21b6" text-anchor="middle">NVIDIA GPUs 🖥️</text>
    
    <rect x="570" y="25" width="200" height="40" rx="6" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="670" y="50" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#5b21b6" text-anchor="middle">Google Global Network 🌐</text>
  </g>
</svg>
