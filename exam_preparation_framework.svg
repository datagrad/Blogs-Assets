<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.05"/>
    </filter>
  </defs>
  <rect width="800" height="350" fill="#f8fafc" rx="16"/>
  <text x="400" y="35" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#0f172a" text-anchor="middle">EXAM STUDY DOMAINS BREAKDOWN</text>
  
  <!-- Row 1 -->
  <g transform="translate(80, 70)" filter="url(#shadow)">
    <rect width="300" height="100" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect width="6" height="100" rx="3" fill="#3b82f6"/>
    <text x="25" y="35" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#1e40af">1. AI Fundamentals (25%)</text>
    <text x="25" y="60" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Understand supervised, unsupervised, and RL</text>
    <text x="25" y="78" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">models; deep learning vs. LLMs.</text>
  </g>
  
  <g transform="translate(420, 70)" filter="url(#shadow)">
    <rect width="300" height="100" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect width="6" height="100" rx="3" fill="#10b981"/>
    <text x="25" y="35" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#065f46">2. Google Cloud Offerings (25%)</text>
    <text x="25" y="60" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Explore Gemini, Gemma, Imagen, Veo, Vertex AI,</text>
    <text x="25" y="78" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">model garden, tuning, &amp; infrastructure.</text>
  </g>
  
  <!-- Row 2 -->
  <g transform="translate(80, 200)" filter="url(#shadow)">
    <rect width="300" height="100" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect width="6" height="100" rx="3" fill="#f59e0b"/>
    <text x="25" y="35" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#b45309">3. Output Improvements (25%)</text>
    <text x="25" y="60" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Master prompt engineering, few-shot prompting,</text>
    <text x="25" y="78" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">grounding, and Human-in-the-Loop (HITL).</text>
  </g>
  
  <g transform="translate(420, 200)" filter="url(#shadow)">
    <rect width="300" height="100" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect width="6" height="100" rx="3" fill="#8b5cf6"/>
    <text x="25" y="35" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#5b21b6">4. Business Strategy (25%)</text>
    <text x="25" y="60" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Align AI with business value, govern ethically,</text>
    <text x="25" y="78" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">manage change, and scale responsibly.</text>
  </g>
</svg>
